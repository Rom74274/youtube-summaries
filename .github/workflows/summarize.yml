name: Summarize new videos

on:
  schedule:
    # Tous les jours à 06:00 UTC (08:00 Paris l'été, 07:00 l'hiver)
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'channels.json'
      - 'scripts/summarize.mjs'
      - '.github/workflows/summarize.yml'

permissions:
  contents: write

concurrency:
  group: summarize
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run summarize script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/summarize.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- public/data; then
            echo "No data changes."
          else
            git add public/data
            git commit -m "data: refresh summaries"
            git push
          fi
